<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Hellowee</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      position: relative;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    /* ─── 캐릭터 ─── */
    .character {
      position: absolute;
      image-rendering: auto;
      cursor: grab;
      user-select: none;
    }
    .character.grabbed { cursor: grabbing; }

    /* ─── 이름표 ─── */
    .nameplate {
      position: absolute;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      white-space: nowrap;
      transform: translateX(-50%);
      pointer-events: none;
    }

    /* ─── 느낌표 알림 ─── */
    .alert-badge {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #ff4757;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      border-radius: 50%;
      text-align: center;
      line-height: 20px;
      pointer-events: none;
      animation: alert-bounce 0.6s ease infinite alternate;
    }
    @keyframes alert-bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-5px); }
    }

    /* ─── 말풍선 ─── */
    .bubble {
      position: absolute;
      background: #fff;
      color: #333;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 12px;
      max-width: 160px;
      word-break: break-word;
      pointer-events: none;
      transform: translateX(-50%);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      animation: bubble-in 0.2s ease;
    }
    .bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 6px solid #fff;
    }
    .bubble.whisper { background: #dfe6fd; color: #3a3d7a; }
    .bubble.whisper::after { border-top-color: #dfe6fd; }
    @keyframes bubble-in {
      from { opacity: 0; transform: translateX(-50%) translateY(5px) scale(0.9); }
      to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }

    /* ─── 팝업 메뉴 ─── */
    .popup-menu {
      position: absolute;
      background: #1a1a22;
      border: 1px solid #333;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      z-index: 999;
      min-width: 140px;
    }
    .popup-menu-item {
      padding: 10px 16px;
      color: #eee;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid #2a2a35;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .popup-menu-item:last-child { border-bottom: none; }
    .popup-menu-item:hover { background: #2a2a35; }

    /* ─── 채팅 입력 ─── */
    .chat-input-wrap {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      z-index: 998;
    }
    .chat-input-wrap.visible { display: flex; }
    .chat-input-wrap input {
      width: 240px;
      padding: 8px 14px;
      border-radius: 99px;
      border: 1px solid #444;
      background: #1a1a22;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    .chat-input-wrap input:focus { border-color: #6C8EBF; }
    .chat-input-label {
      position: absolute;
      top: -20px;
      left: 14px;
      font-size: 10px;
      color: #888;
    }

    /* ─── 핸드폰 채팅 기록창 ─── */
    .phone-chat {
      position: fixed;
      right: 30px;
      bottom: 30px;
      width: 280px;
      height: 420px;
      background: #111;
      border-radius: 28px;
      border: 3px solid #333;
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 1000;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .phone-chat.visible { display: flex; }
    .phone-header {
      padding: 14px 16px 10px;
      background: #1a1a22;
      border-bottom: 1px solid #2a2a35;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .phone-header-title { color: #fff; font-size: 14px; font-weight: 600; }
    .phone-close { background: none; border: none; color: #666; font-size: 18px; cursor: pointer; }
    .phone-close:hover { color: #fff; }
    .phone-tabs {
      display: flex;
      background: #1a1a22;
      border-bottom: 1px solid #2a2a35;
    }
    .phone-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 12px;
      color: #666;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .phone-tab.active { color: #fff; border-bottom-color: #6C8EBF; }
    .phone-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .phone-messages::-webkit-scrollbar { width: 3px; }
    .phone-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 99px; }
    .phone-msg {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 12px;
      line-height: 1.4;
    }
    .phone-msg.other { align-self: flex-start; background: #2a2a35; color: #ddd; }
    .phone-msg.mine { align-self: flex-end; background: #6C8EBF; color: #fff; }
    .phone-msg-name { font-size: 10px; color: #888; margin-bottom: 2px; }
    .phone-msg-time { font-size: 9px; color: #555; margin-top: 2px; text-align: right; }
    .phone-input-wrap {
      padding: 10px;
      background: #1a1a22;
      border-top: 1px solid #2a2a35;
      display: flex;
      gap: 6px;
    }
    .phone-input-wrap input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 99px;
      border: 1px solid #333;
      background: #222;
      color: #fff;
      font-size: 12px;
      outline: none;
    }
    .phone-input-wrap button {
      background: #6C8EBF;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 14px;
    }

    /* ─── 꾸미기 패널 ─── */
    .customizer {
      position: fixed;
      left: 30px;
      bottom: 30px;
      width: 260px;
      background: #1a1a22;
      border: 1px solid #333;
      border-radius: 18px;
      padding: 16px;
      z-index: 1000;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .customizer-title {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      text-align: center;
    }
    .customizer-row {
      margin-bottom: 10px;
    }
    .customizer-label {
      color: #888;
      font-size: 11px;
      margin-bottom: 4px;
    }
    .customizer-options {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .customizer-btn {
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 99px;
      border: 1px solid #333;
      background: #222;
      color: #aaa;
      cursor: pointer;
      transition: all 0.15s;
    }
    .customizer-btn:hover {
      border-color: #6C8EBF;
      color: #fff;
    }
    .customizer-btn.active {
      background: #6C8EBF;
      border-color: #6C8EBF;
      color: #fff;
    }
    .customizer-close {
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #333;
      background: none;
      color: #888;
      cursor: pointer;
      font-size: 12px;
    }
    .customizer-close:hover { background: #2a2a35; color: #fff; }
  </style>
</head>
<body>

  <!-- 채팅 입력 -->
  <div class="chat-input-wrap" id="chatInputWrap">
    <span class="chat-input-label" id="chatInputLabel">전체채팅</span>
    <input type="text" id="chatInput" placeholder="메시지 입력..." autocomplete="off" />
  </div>

  <!-- 핸드폰 채팅 기록창 -->
  <div class="phone-chat" id="phoneChat">
    <div class="phone-header">
      <span class="phone-header-title">💬 Hellowee</span>
      <button class="phone-close" id="phoneChatClose">✕</button>
    </div>
    <div class="phone-tabs">
      <div class="phone-tab active" data-tab="chat">전체채팅</div>
      <div class="phone-tab" data-tab="whisper">귓속말</div>
    </div>
    <div class="phone-messages" id="phoneMessages"></div>
    <div class="phone-input-wrap">
      <input type="text" id="phoneInput" placeholder="메시지 입력..." autocomplete="off" />
      <button id="phoneSend">↑</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
